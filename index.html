<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0B2545" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ma Cultura" />

    <!-- Icône -->
    <link rel="apple-touch-icon" href="https://base44.com/logo_v2.svg" />
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />

    <!-- SEO -->
    <meta name="description" content="Mon journal culturel personnel — films, séries, livres, podcasts." />

    <title>Ma Cultura Perso</title>
  </head>
  <body>
    <!-- Applique le thème avant le rendu React pour éviter le flash sombre -->
    <script>
      (function() {
        var dark = localStorage.getItem('cg-dark-mode') === 'true';
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
